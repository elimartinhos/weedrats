<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeedRats 🌿</title>
    <style>
        :root { --green: #2ecc71; --dark: #1a1a1a; --text: #eee; }
        body { font-family: sans-serif; background: var(--dark); color: var(--text); text-align: center; margin: 0; padding-bottom: 110px; }
        
        header { padding: 15px 20px; border-bottom: 1px solid #333; background: var(--dark); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .user-initial { width: 40px; height: 40px; background: var(--green); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2em; cursor: pointer; position: relative; border: 2px solid #444; }
        
        .user-menu { display: none; position: absolute; top: 50px; right: 0; background: #252525; border: 1px solid #444; border-radius: 12px; padding: 8px; width: 180px; z-index: 500; box-shadow: 0 8px 25px rgba(0,0,0,0.9); }
        .user-menu button { width: 100%; background: none; border: none; color: white; padding: 12px; text-align: left; cursor: pointer; border-radius: 6px; font-size: 0.95em; display: block; }
        .user-menu button:hover { background: #333; }

        #ranking { background: #252525; margin: 15px; padding: 15px; border-radius: 12px; border: 1px solid var(--green); }
        #feed { padding: 10px; max-width: 500px; margin: 0 auto; }
        .post { background: #222; margin-bottom: 25px; border-radius: 15px; overflow: hidden; border: 1px solid #333; text-align: left; position: relative; }
        .post img { width: 100%; height: auto; display: block; }
        .post-content { padding: 15px; }
        .username { font-weight: bold; margin-bottom: 5px; display: block; }

        .reactions-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; align-items: center; }
        .react-count { background: #333; border: 1px solid #444; color: white; padding: 4px 10px; border-radius: 12px; font-size: 0.85em; cursor: pointer; }
        .react-count.active { border-color: var(--green); background: #1e3a2a; }
        
        /* Picker Container */
        .picker-container { position: static; } 
        .add-emoji-btn { cursor: pointer; background: #333; border: 1px solid #444; border-radius: 8px; padding: 5px 12px; color: #fff; font-size: 1.1em; outline: none; }
        
        /* SELETOR DO TAMANHO DO FRAME DO POST - AGORA CONTROLADO POR CLASSE .show */
        .emoji-leque { 
            display: none; position: absolute; bottom: 80px; left: 0; right: 0;
            background: #252525; padding: 15px; border-top: 2px solid #555; border-bottom: 2px solid #555;
            z-index: 1000; grid-template-columns: repeat(8, 1fr); gap: 10px;
            max-height: 350px; overflow-y: auto;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }
        .emoji-leque.show { display: grid; }
        .emoji-option { cursor: pointer; font-size: 1.8em; background: none; border: none; padding: 8px; border-radius: 10px; }

        .comments-section { background: #1a1a1a; padding: 10px; font-size: 0.85em; border-radius: 8px; margin-top: 10px; max-height: 150px; overflow-y: auto; }
        .comment { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .comment-box { display: flex; gap: 8px; margin-top: 10px; }
        .comment-input { flex-grow: 1; background: #333; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; box-sizing: border-box; }
        .btn-comment-ok { background: var(--green); border: none; color: white; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        #upload-area { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 200; width: 90%; max-width: 400px; }
        .btn { background: var(--green); border: none; padding: 14px 28px; border-radius: 30px; color: white; cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0">WeedRats 🌿</h2>
        <div id="auth-section">
            <button id="btnLogin" class="btn" style="width:auto">Login</button>
            <div id="user-initial-box" class="hidden">
                <div class="user-initial" id="initialCircle" onclick="toggleUserMenu()">?
                    <div class="user-menu" id="userMenu">
                        <button onclick="alterarNick()">📝 Mudar Nick</button>
                        <hr style="border:0; border-top:1px solid #444; margin: 5px 0;">
                        <button onclick="auth.signOut().then(() => location.reload())" style="color:#e74c3c">🚪 Sair</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="ranking">
        <strong>🏆 TOP RATS</strong>
        <div id="listRanking" style="margin-top:10px;">Carregando...</div>
    </div>

    <main id="feed"></main>

    <div id="upload-area" class="hidden">
        <input type="file" id="fileInput" accept="image/*" class="hidden">
        <button id="btnCheckin" onclick="document.getElementById('fileInput').click()" class="btn">🔥 LANÇAR CHECK-IN</button>
        <p id="msgLimit" class="hidden" style="font-size: 0.85em; color: #e74c3c; margin-top: 10px; font-weight: bold;">Check-in diário concluído! ✅</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, setDoc, updateDoc, where, limit, deleteField } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBT4P90b1zGfPPn8h1wpPbrs9QgARMOuQU",
            authDomain: "weedrats-45fd9.firebaseapp.com",
            projectId: "weedrats-45fd9",
            storageBucket: "weedrats-45fd9.firebasestorage.app",
            messagingSenderId: "949571679941",
            appId: "1:949571679941:web:0ea15c60c2591372bee2ac",
            measurementId: "G-T3MEB7571K"
        };

        const app = initializeApp(firebaseConfig);
        const auth = window.auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dexhvbdau/image/upload";
        const CLOUDINARY_PRESET = "weedrats_preset";

        const EMOJIS = ['🔥','🌿','💨','👽','🍄','🇯🇲','🐀','🦁','🐍','🐲','🐒','🦄','🌵','🌴','🍀','🍁','🌲','🌻','💀','🤡','🤖','🤠','😈','🤮','🙄','😎','😍','😂','🚀','🛸','💻','📱','🎮','🔋','💎','🎸','💵','🚬','🍿','🍕','🍦','🎨','🎭','🌊','🌈','⚡','🧿','👑','🧬','🧪','💩','👻','🎃','👺','🐺','🐗','🐯','🦒','🐘','🦓','🦍','🦧','🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐙','🦑','🦐','🦞','🦀','🐡','🐠','🐬','🐳','🦈','🐊','🐢','🦎','🦖','🦕','🐉','🦜','🦢','🦩','🕊️','🦉','🦇','🦋','🐌','🐜'];

        window.toggleUserMenu = () => {
            const m = document.getElementById('userMenu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        };

        // FECHAR TUDO AO CLICAR FORA
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.picker-container')) {
                document.querySelectorAll('.emoji-leque').forEach(el => el.classList.remove('show'));
            }
        });

        window.toggleEmojiPicker = (id) => {
            const el = document.getElementById(`leque-${id}`);
            const isShow = el.classList.contains('show');
            document.querySelectorAll('.emoji-leque').forEach(l => l.classList.remove('show'));
            if (!isShow) el.classList.add('show');
        };

        document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const p = await verificarPerfil(user);
                document.getElementById('btnLogin').classList.add('hidden');
                document.getElementById('user-initial-box').classList.remove('hidden');
                document.getElementById('upload-area').classList.remove('hidden'); 
                const initial = p.nickname.charAt(0).toUpperCase();
                document.getElementById('initialCircle').firstChild.textContent = initial;
                document.getElementById('initialCircle').style.backgroundColor = p.color || '#2ecc71';
                verificarLimiteDiario(user.uid);
                carregarPostsERanking();
            }
        });

        async function verificarPerfil(user) {
            const r = doc(db, "users", user.uid);
            const s = await getDoc(r);
            if (!s.exists()) {
                const n = prompt("Qual seu vulgo?", user.displayName) || user.displayName;
                const d = { nickname: n, uid: user.uid, color: '#2ecc71' };
                await setDoc(r, d); return d;
            }
            return s.data();
        }

        window.alterarNick = async () => {
            const n = prompt("Novo nick:");
            if (n) { await updateDoc(doc(db, "users", auth.currentUser.uid), { nickname: n }); location.reload(); }
        };

        async function verificarLimiteDiario(uid) {
            const h = new Date(); h.setHours(0,0,0,0);
            const q = query(collection(db, "posts"), where("uid", "==", uid), where("timestamp", ">=", h), limit(1));
            onSnapshot(q, s => { 
                if(!s.empty){ 
                    document.getElementById('btnCheckin').disabled = true; 
                    document.getElementById('msgLimit').classList.remove('hidden'); 
                }
            });
        }

        window.reagir = async (postId, emoji) => {
            const u = auth.currentUser.uid;
            const r = doc(db, "posts", postId);
            const s = await getDoc(r);
            const reacts = s.data().userReactions || {};
            if (reacts[u] === emoji) { await updateDoc(r, { [`userReactions.${u}`]: deleteField() }); }
            else { await updateDoc(r, { [`userReactions.${u}`]: emoji }); }
            document.getElementById(`leque-${postId}`).classList.remove('show');
        };

        function atualizarReacoesNaTela(postId, reacoes) {
            const b = document.getElementById(`reactions-${postId}`);
            if (!b) return;
            const my = auth.currentUser ? reacoes[auth.currentUser.uid] : null;
            const tots = {};
            Object.values(reacoes).forEach(e => tots[e] = (tots[e] || 0) + 1);

            const hReacoes = Object.entries(tots).map(([e, c]) => `
                <button class="react-count ${my === e ? 'active' : ''}" onclick="reagir('${postId}', '${e}')">${e} ${c}</button>
            `).join('');

            const hLeque = EMOJIS.map(e => `<button class="emoji-option" onclick="reagir('${postId}', '${e}')">${e}</button>`).join('');

            b.innerHTML = `${hReacoes} <div class="picker-container"><button class="add-emoji-btn" onclick="toggleEmojiPicker('${postId}')">☺</button><div class="emoji-leque" id="leque-${postId}">${hLeque}</div></div>`;
        }

        document.getElementById('fileInput').onchange = async (e) => {
            const f = e.target.files[0]; if (!f) return;
            const btn = document.getElementById('btnCheckin'); btn.disabled = true; btn.innerText = "SUBINDO...";
            const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', CLOUDINARY_PRESET);
            try {
                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
                const j = await res.json();
                await addDoc(collection(db, "posts"), { uid: auth.currentUser.uid, imageUrl: j.secure_url, timestamp: serverTimestamp(), userReactions: {} });
            } catch (err) { alert("Erro!"); btn.disabled = false; btn.innerText = "🔥 LANÇAR CHECK-IN"; }
        };

        function carregarPostsERanking() {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('feed');
                const rankingDiv = document.getElementById('listRanking');
                snap.docs.forEach(async (d) => {
                    const data = d.data(); const id = d.id;
                    let el = document.getElementById(`post-${id}`);
                    if (!el) {
                        el = document.createElement('div'); el.className = 'post'; el.id = `post-${id}`;
                        feed.appendChild(el);
                        const u = await getDoc(doc(db, "users", data.uid));
                        const ud = u.data();
                        el.innerHTML = `
                            <img src="${data.imageUrl}">
                            <div class="post-content">
                                <span class="username" style="color:${ud.color || 'var(--green)'}">${ud.nickname}</span>
                                <div class="reactions-bar" id="reactions-${id}"></div>
                                <div class="comments-section" id="comments-${id}"></div>
                                <div class="comment-box">
                                    <input type="text" id="input-${id}" class="comment-input" placeholder="Comentar...">
                                    <button class="btn-comment-ok" onclick="enviarComent('${id}')">OK</button>
                                </div>
                            </div>`;
                        onSnapshot(query(collection(db, `posts/${id}/comments`), orderBy("timestamp", "asc")), s => {
                            const cDiv = document.getElementById(`comments-${id}`);
                            if(cDiv) cDiv.innerHTML = s.docs.map(cd => `<div class="comment"><b>${cd.data().user}:</b> ${cd.data().text}</div>`).join('');
                        });
                    }
                    atualizarReacoesNaTela(id, data.userReactions || {});
                });
                setTimeout(async () => {
                    const counts = {};
                    for(let d of snap.docs) {
                        const u = await getDoc(doc(db, "users", d.data().uid));
                        if(u.exists()){
                           const n = u.data().nickname;
                           counts[n] = (counts[n] || 0) + 1;
                        }
                    }
                    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
                    rankingDiv.innerHTML = sorted.map(([n, p], i) => `<div style="display:flex; justify-content:space-between;"><span>${i+1}º ${n}</span><b>${p} pts</b></div>`).join('');
                }, 1000);
            });
        }

        window.enviarComent = async (id) => {
            const input = document.getElementById(`input-${id}`);
            if(!input.value) return;
            const u = await getDoc(doc(db, "users", auth.currentUser.uid));
            await addDoc(collection(db, `posts/${id}/comments`), { text: input.value, user: u.data().nickname, timestamp: serverTimestamp() });
            input.value = "";
        };
    </script>
</body>
</html>
