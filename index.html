<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeedRats 🌿</title>
    <style>
        :root { --green: #2ecc71; --dark: #1a1a1a; --text: #eee; }
        body { font-family: sans-serif; background: var(--dark); color: var(--text); text-align: center; margin: 0; padding-bottom: 90px; }
        header { padding: 20px; border-bottom: 1px solid #333; background: var(--dark); position: sticky; top: 0; z-index: 10; }
        #ranking { background: #252525; margin: 15px; padding: 15px; border-radius: 12px; border: 1px solid var(--green); }
        #feed { padding: 10px; max-width: 500px; margin: 0 auto; }
        .post { background: #222; margin-bottom: 25px; border-radius: 15px; overflow: hidden; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .post img { width: 100%; height: auto; display: block; }
        .post-info { padding: 15px; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--green); border: none; padding: 14px 28px; border-radius: 30px; color: white; cursor: pointer; font-weight: bold; font-size: 1em; }
        .btn:disabled { background: #444; color: #888; }
        #upload-area { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 100; width: 90%; max-width: 400px; }
        .hidden { display: none; }
        .username { font-weight: bold; color: var(--green); }
        .rank-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #444; }
    </style>
</head>
<body>

    <header>
        <h1>WeedRats 🌿</h1>
        <div id="auth-section">
            <button id="btnLogin" class="btn">Login com Google</button>
            <div id="user-logged" class="hidden">
                Bem-vindo, <span id="userName" class="username"></span>! 
                <button onclick="window.location.reload()" style="background:none; border:none; color:gray; cursor:pointer; font-size: 0.8em;">[Sair]</button>
            </div>
        </div>
    </header>

    <div id="ranking">
        <strong>🏆 TOP RATS (Total)</strong>
        <div id="listRanking" style="margin-top:10px;">Ainda não há mulas chapadas...</div>
    </div>

    <main id="feed">
        <p style="color: #888; margin-top: 50px;">Faça login para ver o feed!</p>
    </main>

    <div id="upload-area" class="hidden">
        <input type="file" id="fileInput" accept="image/*" class="hidden">
        <button id="btnCheckin" onclick="document.getElementById('fileInput').click()" class="btn" style="width: 100%;">🔥 LANÇAR CHECK-IN</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURAÇÕES DO FIREBASE (Suas chaves da imagem)
        const firebaseConfig = {
            apiKey: "AIzaSyBT4P90b1zGfPPn8h1wpPbrs9QgARMOuQU",
            authDomain: "weedrats-45fd9.firebaseapp.com",
            projectId: "weedrats-45fd9",
            storageBucket: "weedrats-45fd9.firebasestorage.app",
            messagingSenderId: "949571679941",
            appId: "1:949571679941:web:0ea15c60c2591372bee2ac",
            measurementId: "G-T3MEB7571K"
        };
        
        // CONFIGURAÇÕES DO CLOUDINARY (Seu Cloud Name)
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dexhvbdau/image/upload";
        const CLOUDINARY_PRESET = "weedrats_preset";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const btnLogin = document.getElementById('btnLogin');
        const userLogged = document.getElementById('user-logged');
        const uploadArea = document.getElementById('upload-area');

        // LOGIN COM GOOGLE
        btnLogin.onclick = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                btnLogin.classList.add('hidden');
                userLogged.classList.remove('hidden');
                uploadArea.classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName;
                carregarPostsERanking();
            }
        });

        // UPLOAD CLOUDINARY + FIREBASE
        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file || !auth.currentUser) return;

            const btn = document.getElementById('btnCheckin');
            btn.disabled = true;
            btn.innerText = "SUBINDO FUMAÇA...";

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_PRESET);

            try {
                // 1. Sobe para o Cloudinary
                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                const json = await res.json();
                const fotoUrl = json.secure_url;

                // 2. Salva o link no Firestore
                await addDoc(collection(db, "posts"), {
                    uid: auth.currentUser.uid,
                    userName: auth.currentUser.displayName,
                    imageUrl: fotoUrl,
                    timestamp: serverTimestamp()
                });

                alert("Check-in feito com sucesso! 🔥");
            } catch (err) {
                console.error(err);
                alert("Erro ao subir check-in!");
            } finally {
                btn.disabled = false;
                btn.innerText = "🔥 LANÇAR CHECK-IN";
            }
        };

        // CARREGAR FEED E RANKING EM TEMPO REAL
        function carregarPostsERanking() {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('feed');
                const rankingDiv = document.getElementById('listRanking');
                const contagem = {};
                feed.innerHTML = "";

                snapshot.forEach(doc => {
                    const data = doc.data();
                    
                    // Alimenta o Feed
                    feed.innerHTML += `
                        <div class="post">
                            <img src="${data.imageUrl}" loading="lazy">
                            <div class="post-info">
                                <span><span class="username">${data.userName}</span></span>
                                <span>🌿🔥💨</span>
                            </div>
                        </div>`;
                    
                    // Lógica do Ranking
                    contagem[data.userName] = (contagem[data.userName] || 0) + 1;
                });

                // Renderiza Ranking (Top 5)
                const sorted = Object.entries(contagem).sort((a,b) => b[1] - a[1]).slice(0, 5);
                rankingDiv.innerHTML = sorted.map(([name, pts], i) => `
                    <div class="rank-item">
                        <span>${i+1}º ${name}</span>
                        <span class="username">${pts} pts</span>
                    </div>
                `).join('') || "Ninguém postou nada.";
            });
        }
    </script>
</body>
</html>
