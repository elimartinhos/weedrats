<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeedRats 🌿</title>
    <style>
        :root { --green: #2ecc71; --dark: #1a1a1a; --text: #eee; }
        body { font-family: sans-serif; background: var(--dark); color: var(--text); text-align: center; margin: 0; }
        header { padding: 20px; border-bottom: 1px solid #333; }
        #feed { padding: 10px; }
        .post { background: #252525; margin-bottom: 15px; border-radius: 10px; overflow: hidden; }
        .post img { width: 100%; display: block; }
        .actions { padding: 10px; display: flex; gap: 10px; justify-content: center; }
        .btn { background: var(--green); border: none; padding: 10px 20px; border-radius: 20px; color: white; cursor: pointer; }
        #upload-area { position: fixed; bottom: 20px; right: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>WeedRats</h1>
        <div id="user-info">
            <button id="btnLogin" class="btn">Login com Google</button>
            <span id="userName" class="hidden"></span>
        </div>
    </header>

    <div id="ranking">
        <h3>🏆 Top Rats da Semana</h3>
        <div id="listRanking"></div>
    </div>

    <main id="feed">
        </main>

    <div id="upload-area" class="hidden">
        <input type="file" id="fileInput" accept="image/*" class="hidden">
        <button onclick="document.getElementById('fileInput').click()" class="btn">🔥 Check-in</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* COLE SUAS CHAVES AQUI */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Login
        document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('btnLogin').classList.add('hidden');
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userName').classList.remove('hidden');
                document.getElementById('upload-area').classList.remove('hidden');
            }
        });

        // Lógica de Postagem e Ranking virá aqui
    </script>
</body>
</html>
