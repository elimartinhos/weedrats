<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeedRats 🌿</title>
    <style>
        :root { --green: #2ecc71; --dark: #1a1a1a; --text: #eee; }
        body { font-family: sans-serif; background: var(--dark); color: var(--text); text-align: center; margin: 0; padding-bottom: 110px; }
        header { padding: 20px; border-bottom: 1px solid #333; background: var(--dark); position: sticky; top: 0; z-index: 100; }
        #ranking { background: #252525; margin: 15px; padding: 15px; border-radius: 12px; border: 1px solid var(--green); }
        #feed { padding: 10px; max-width: 500px; margin: 0 auto; }
        .post { background: #222; margin-bottom: 25px; border-radius: 15px; overflow: hidden; border: 1px solid #333; text-align: left; }
        .post img { width: 100%; height: auto; display: block; }
        .post-content { padding: 15px; }
        .username { font-weight: bold; color: var(--green); }
        .btn { background: var(--green); border: none; padding: 14px 28px; border-radius: 30px; color: white; cursor: pointer; font-weight: bold; }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        /* Reações Feitas do Zero */
        .reactions-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; align-items: center; }
        .react-count { background: #333; border: 1px solid #444; color: white; padding: 4px 10px; border-radius: 12px; font-size: 0.85em; cursor: pointer; transition: 0.2s; }
        .react-count.active { border-color: var(--green); background: #1e3a2a; }
        
        /* Leque de Emojis Nativo (Abre ao passar o mouse/tocar) */
        .picker-container { position: relative; display: inline-block; }
        .add-emoji-btn { cursor: pointer; background: none; border: none; font-size: 1.4em; padding: 5px; transition: transform 0.2s; }
        .add-emoji-btn:hover { transform: scale(1.1); }
        .emoji-leque { display: none; position: absolute; bottom: 100%; left: 0; background: #333; padding: 8px; border-radius: 20px; border: 1px solid #555; white-space: nowrap; z-index: 150; box-shadow: 0 -4px 10px rgba(0,0,0,0.5); }
        .picker-container:hover .emoji-leque { display: flex; gap: 10px; }
        .emoji-option { cursor: pointer; font-size: 1.3em; background: none; border: none; padding: 0; transition: transform 0.2s; }
        .emoji-option:hover { transform: scale(1.3); }

        /* Comentários */
        .comments-section { background: #1a1a1a; padding: 10px; font-size: 0.85em; border-radius: 8px; margin-top: 10px; max-height: 150px; overflow-y: auto; }
        .comment { margin-bottom: 5px; }
        .comment b { color: var(--green); }
        .comment-input { width: 100%; background: #333; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; margin-top: 10px; box-sizing: border-box; }
        
        #upload-area { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 200; width: 90%; max-width: 400px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>WeedRats 🌿</h1>
        <div id="auth-section">
            <button id="btnLogin" class="btn">Login com Google</button>
            <div id="user-info" class="hidden">
                <span id="userName" class="username"></span> 
                <span style="font-size:0.7em; cursor:pointer; text-decoration:underline; color:#888" onclick="alterarNick()">[mudar nick]</span>
                | <button onclick="auth.signOut().then(() => location.reload())" style="background:none; border:none; color:gray; cursor:pointer;">Sair</button>
            </div>
        </div>
    </header>

    <div id="ranking">
        <strong>🏆 TOP RATS</strong>
        <div id="listRanking" style="margin-top:10px;">Carregando...</div>
    </div>

    <main id="feed"></main>

    <div id="upload-area" class="hidden">
        <input type="file" id="fileInput" accept="image/*" class="hidden">
        <button id="btnCheckin" onclick="document.getElementById('fileInput').click()" class="btn" style="width: 100%;">🔥 LANÇAR CHECK-IN</button>
        <p id="msgLimit" class="hidden" style="font-size: 0.85em; color: #e74c3c; margin-top: 10px; font-weight: bold;">Check-in diário concluído! ✅ Volte amanhã.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, setDoc, updateDoc, where, limit, deleteField } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBT4P90b1zGfPPn8h1wpPbrs9QgARMOuQU",
            authDomain: "weedrats-45fd9.firebaseapp.com",
            projectId: "weedrats-45fd9",
            storageBucket: "weedrats-45fd9.firebasestorage.app",
            messagingSenderId: "949571679941",
            appId: "1:949571679941:web:0ea15c60c2591372bee2ac",
            measurementId: "G-T3MEB7571K"
        };
        
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dexhvbdau/image/upload";
        const CLOUDINARY_PRESET = "weedrats_preset";

        const app = initializeApp(firebaseConfig);
        const auth = window.auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const EMOJIS_DISPONIVEIS = ['🔥', '🌿', '💨', '👽', '🍄'];

        document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const nick = await verificarPerfil(user);
                document.getElementById('btnLogin').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('userName').innerText = nick;
                document.getElementById('upload-area').classList.remove('hidden');
                verificarLimiteDiario(user.uid);
                carregarPostsERanking();
            }
        });

        async function verificarPerfil(user) {
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) {
                const nick = prompt("Qual seu vulgo?", user.displayName) || user.displayName;
                await setDoc(userRef, { nickname: nick, uid: user.uid });
                return nick;
            }
            return userSnap.data().nickname;
        }

        window.alterarNick = async () => {
            const novo = prompt("Novo nick:");
            if (novo) {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { nickname: novo });
                location.reload();
            }
        };

        function travarBotao() {
            document.getElementById('btnCheckin').disabled = true;
            document.getElementById('msgLimit').classList.remove('hidden');
        }

        async function verificarLimiteDiario(uid) {
            const hoje = new Date(); hoje.setHours(0,0,0,0);
            const q = query(collection(db, "posts"), where("uid", "==", uid), where("timestamp", ">=", hoje), limit(1));
            onSnapshot(q, s => { if(!s.empty){ travarBotao(); }});
        }

        window.reagir = async (postId, emojiEscolhido) => {
            if (!auth.currentUser) return;
            const uid = auth.currentUser.uid;
            const postRef = doc(db, "posts", postId);
            
            const postSnap = await getDoc(postRef);
            if (!postSnap.exists()) return;
            
            const reacoesAtuais = postSnap.data().userReactions || {};
            const minhaReacao = reacoesAtuais[uid];

            if (minhaReacao === emojiEscolhido) {
                await updateDoc(postRef, { [`userReactions.${uid}`]: deleteField() });
            } else {
                await updateDoc(postRef, { [`userReactions.${uid}`]: emojiEscolhido });
            }
        };

        window.enviarComentario = async (postId, input, event) => {
            if (event.key === 'Enter' && input.value) {
                const userSnap = await getDoc(doc(db, "users", auth.currentUser.uid));
                await addDoc(collection(db, `posts/${postId}/comments`), {
                    text: input.value, user: userSnap.data().nickname, timestamp: serverTimestamp()
                });
                input.value = "";
            }
        };

        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const btn = document.getElementById('btnCheckin');
            btn.disabled = true; btn.innerText = "SUBINDO FUMAÇA...";
            const formData = new FormData();
            formData.append('file', file); formData.append('upload_preset', CLOUDINARY_PRESET);
            try {
                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                const json = await res.json();
                await addDoc(collection(db, "posts"), {
                    uid: auth.currentUser.uid, 
                    imageUrl: json.secure_url, 
                    timestamp: serverTimestamp(),
                    userReactions: {}
                });
                travarBotao();
            } catch (err) { alert("Erro ao enviar a foto!"); btn.disabled = false; btn.innerText = "🔥 LANÇAR CHECK-IN"; }
        };

        // Função que injeta SÓ as reações no HTML, sem piscar a imagem
        function atualizarReacoesNaTela(postId, reacoes) {
            const bar = document.getElementById(`reactions-${postId}`);
            if (!bar) return;

            const minhaReacao = auth.currentUser ? reacoes[auth.currentUser.uid] : null;
            const totais = {};
            
            Object.values(reacoes).forEach(emoji => {
                totais[emoji] = (totais[emoji] || 0) + 1;
            });

            const htmlReacoesExistentes = Object.entries(totais).map(([emoji, count]) => `
                <button class="react-count ${minhaReacao === emoji ? 'active' : ''}" onclick="reagir('${postId}', '${emoji}')">
                    ${emoji} ${count}
                </button>
            `).join('');

            const htmlOpcoesLeque = EMOJIS_DISPONIVEIS.map(emoji => `
                <button class="emoji-option" onclick="reagir('${postId}', '${emoji}')">${emoji}</button>
            `).join('');

            bar.innerHTML = `
                ${htmlReacoesExistentes}
                <div class="picker-container">
                    <button class="add-emoji-btn">😀</button>
                    <div class="emoji-leque">${htmlOpcoesLeque}</div>
                </div>
            `;
        }

        function carregarPostsERanking() {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('feed');
                const rankingDiv = document.getElementById('listRanking');

                snapshot.docs.forEach((postDoc, index) => {
                    const data = postDoc.data();
                    const postId = postDoc.id;

                    // Procura se o post já tá renderizado no feed
                    let postElement = document.getElementById(`post-${postId}`);

                    if (!postElement) {
                        // POST NOVO: Cria a caixa dele
                        postElement = document.createElement('div');
                        postElement.className = 'post';
                        postElement.id = `post-${postId}`;
                        
                        // Garante que fique na ordem certa descendo
                        if (index >= feed.children.length) {
                            feed.appendChild(postElement);
                        } else {
                            feed.insertBefore(postElement, feed.children[index]);
                        }

                        // Puxa o nick e monta a estrutura base do post
                        getDoc(doc(db, "users", data.uid)).then(uSnap => {
                            const currentNick = uSnap.exists() ? uSnap.data().nickname : "Rat";
                            
                            postElement.innerHTML = `
                                <img src="${data.imageUrl}">
                                <div class="post-content">
                                    <span class="username">${currentNick}</span>
                                    <div class="reactions-bar" id="reactions-${postId}"></div>
                                    <div class="comments-section" id="comments-${postId}"></div>
                                    <input type="text" class="comment-input" placeholder="Comentar..." onkeypress="enviarComentario('${postId}', this, event)">
                                </div>`;
                            
                            // Adiciona as reações iniciais
                            atualizarReacoesNaTela(postId, data.userReactions || {});

                            // Inicia a escuta dos comentários pra esse post específico
                            onSnapshot(query(collection(db, `posts/${postId}/comments`), orderBy("timestamp", "asc")), s => {
                                const div = document.getElementById(`comments-${postId}`);
                                if(div) div.innerHTML = s.docs.map(d => `<div class="comment"><b>${d.data().user}:</b> ${d.data().text}</div>`).join('');
                            });
                        });
                    } else {
                        // POST JÁ EXISTE: Só atualiza as reações (sem piscar tela)
                        atualizarReacoesNaTela(postId, data.userReactions || {});
                    }
                });

                // Atualiza Ranking de forma assíncrona pra não travar o feed
                setTimeout(async () => {
                    const contagem = {};
                    for (let d of snapshot.docs) {
                        const uSnap = await getDoc(doc(db, "users", d.data().uid));
                        const nick = uSnap.exists() ? uSnap.data().nickname : "Rat";
                        contagem[nick] = (contagem[nick] || 0) + 1;
                    }
                    const sorted = Object.entries(contagem).sort((a,b) => b[1] - a[1]).slice(0, 5);
                    rankingDiv.innerHTML = sorted.map(([n, p], i) => `<div style="display:flex; justify-content:space-between;"><span>${i+1}º ${n}</span><b>${p} pts</b></div>`).join('');
                }, 500);
            });
        }
    </script>
</body>
</html>
